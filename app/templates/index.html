<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Home</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <!-- Connecting outer file styles styles.css -->
</head>
<body>
<div class="container">
    <h1 class="main-heading">Welcome to Health Tracker</h1>
    <p class="subheading">This site is built with Python in 2024. The program functions and uses user's personal data.</p>
    {% if current_user.is_authenticated %}
        <p>Hello, {{ current_user.first_name }}!</p>
        <a href="{{ url_for('main.logout') }}" class="btn btn-logout">Logout</a>
    {% else %}
        <a href="{{ url_for('main.login') }}" class="btn btn-login">Login</a>
        <a href="{{ url_for('main.register') }}" class="btn btn-register">Register</a>
    {% endif %}
</div>
</body>
</html>
